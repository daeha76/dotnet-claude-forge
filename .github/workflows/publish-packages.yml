name: Publish Daeha.CleanArch NuGet Packages

# git tag packages/v1.0.0 → 자동 배포
on:
  push:
    tags:
      - 'packages/v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: |
          # packages/v1.2.3 → 1.2.3
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#packages/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Packaging version: $VERSION"

      - name: Restore dependencies
        run: dotnet restore packages/Daeha.CleanArch.slnx

      - name: Build
        run: dotnet build packages/Daeha.CleanArch.slnx -c Release --no-restore

      - name: Run tests
        run: dotnet test packages/Daeha.CleanArch.slnx -c Release --no-build \
          --filter "Category=Unit" \
          --logger "console;verbosity=normal"

      - name: Pack
        run: |
          dotnet pack packages/Daeha.CleanArch.slnx \
            -c Release \
            --no-build \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            -o /tmp/nupkgs

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push /tmp/nupkgs/*.nupkg \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

      - name: Summary
        run: |
          echo "## 배포 완료 ✅" >> $GITHUB_STEP_SUMMARY
          echo "**버전**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 배포된 패키지" >> $GITHUB_STEP_SUMMARY
          echo "- \`Daeha.CleanArch.Domain\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`Daeha.CleanArch.Application\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`Daeha.CleanArch.Infrastructure\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`Daeha.CleanArch.Api\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 사용 방법" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# nuget.config에 GitHub Packages 소스 추가 후:" >> $GITHUB_STEP_SUMMARY
          echo "dotnet add package Daeha.CleanArch.Domain --version ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
